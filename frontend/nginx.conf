server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # ── Bảo mật HTTP headers ──────────────────────────────────────────────────
    # CSP: chỉ cho phép script/style/font/image từ cùng origin ('self')
    # connect-src: thêm ws: wss: để WebSocket hoạt động
    # style-src 'unsafe-inline': Tailwind inject inline style khi build
    # script-src 'wasm-unsafe-eval': libsodium dùng WebAssembly, cần directive này
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob:; connect-src 'self' ws: wss:;" always;
    # Chống MIME sniffing: browser không được đoán lại Content-Type
    add_header X-Content-Type-Options "nosniff" always;
    # Chống clickjacking: không cho nhúng trang vào iframe từ domain khác
    add_header X-Frame-Options "DENY" always;
    # Tắt Referer khi navigate ra ngoài: không lộ URL nội bộ
    add_header Referrer-Policy "no-referrer" always;

    # React SPA: mọi route không khớp file → trả index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Giới hạn upload file — phải >= giới hạn backend (5MB) + overhead mã hóa (~1.4x)
    client_max_body_size 7m;

    # Proxy REST API đến backend
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy WebSocket đến backend
    location /ws {
        proxy_pass http://backend:3000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
