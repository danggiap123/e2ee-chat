version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: e2ee_postgres
    environment:
      POSTGRES_USER: e2ee_user
      POSTGRES_PASSWORD: e2ee_password
      POSTGRES_DB: e2ee_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: e2ee_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: